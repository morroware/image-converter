<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <!-- Shield backdrop -->
  <path d="M32 2 L58 10 Q58 36 32 62 Q6 36 6 10 Z" fill="url(#shield)" stroke="url(#gold)" stroke-width="2"/>

  <!-- Castle silhouette -->
  <g fill="url(#gold)" stroke="#fef3c7" stroke-width="0.5">
    <!-- Left tower -->
    <rect x="14" y="24" width="8" height="24"/>
    <polygon points="12,24 24,24 22,20 20,22 18,20 16,22 14,20"/>
    <!-- Right tower -->
    <rect x="42" y="24" width="8" height="24"/>
    <polygon points="40,24 52,24 50,20 48,22 46,20 44,22 42,20"/>
    <!-- Central keep -->
    <rect x="22" y="20" width="20" height="28"/>
    <polygon points="20,20 44,20 42,14 39,16 36,14 33,16 30,14 27,16 24,14 22,16"/>
    <!-- Flag pole + flag -->
    <rect x="31.2" y="4" width="1.6" height="10"/>
    <polygon points="32.8,4 40,7 32.8,10" fill="#dc2626" stroke="none"/>
  </g>

  <!-- Gate -->
  <path d="M27 48 L27 40 Q27 34 32 34 Q37 34 37 40 L37 48 Z" fill="#0f0a1e" stroke="#fef3c7" stroke-width="0.5"/>

  <!-- Windows -->
  <rect x="16.5" y="30" width="3" height="5" fill="#0f0a1e"/>
  <rect x="44.5" y="30" width="3" height="5" fill="#0f0a1e"/>
</svg>
